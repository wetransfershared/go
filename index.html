<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeTransfer Ultimate</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f3f3f3;
color:#111;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#f3f3f3;
}

.logo{
font-weight:700;
font-size:22px;
}

.nav-links{
display:flex;
gap:30px;
align-items:center;
font-size:15px;
}

.nav-links a{
text-decoration:none;
color:#333;
}

.nav-right{
display:flex;
gap:15px;
align-items:center;
}

.btn-outline{
border:1px solid #ddd;
padding:8px 16px;
border-radius:20px;
background:white;
}

.btn-dark{
background:#111;
color:white;
padding:8px 16px;
border-radius:20px;
border:none;
}

/* HERO */

.hero{
display:flex;
padding:40px;
gap:80px;
align-items:flex-start;
}

/* LEFT CARD */

.card{
background:white;
width:300px;
padding:30px;
border-radius:18px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.circle{
width:45px;
height:45px;
border-radius:50%;
background:black;
margin-bottom:20px;
}

.card h1{
font-size:32px;
font-weight:600;
margin-bottom:20px;
}

.card h1 span{
font-weight:800;
}

.card p{
font-size:14px;
color:#555;
line-height:1.6;
margin-bottom:20px;
}

.agree-btn{
display:block;
text-align:center;
text-decoration:none;
width:100%;
background:#3b63f3;
color:white;
padding:14px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

/* CENTER CTA */

.center-area{
flex:1;
display:flex;
justify-content:center;
align-items:center;
height:300px;
}

.try-btn{
background:#3b63f3;
color:white;
border:none;
padding:16px 40px;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.title{
font-size:28px;
margin:40px;
}

.title span{
color:#3b63f3;
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">we</div>

<div class="nav-links">
<a href="#">Features</a>
<a href="#">Pricing</a>
<a href="#">Use cases</a>
<a href="#">Resources</a>
<a href="#">What's new</a>
</div>

<div class="nav-right">
<button class="btn-outline">Log in</button>
<button class="btn-dark">Sign up</button>
</div>

</div>

<div class="title">
WeTransfer <span>Ultimate</span>
</div>

<div class="hero">

<div class="card">

<div class="circle"></div>

<h1>You’re <span>almost</span> there</h1>

<p>
You have been shared a file via secure transfer. Click the button below to view and download the file.
</p>

<!-- ACCESS FILE LINK -->
<a href="https://example.com/file" class="agree-btn">Access File</a>

</div>

<div class="center-area">
<button class="try-btn">TRY FOR FREE</button>
</div>

</div>

</body>
</html>
